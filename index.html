    /* ─── HELPERS ─── */
    function simpleHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
      return h.toString(36);
    }

    function HTML({ tag: Tag = 'span', html, className = '' }) {
      return <Tag className={className} dangerouslySetInnerHTML={{ __html: html }} />;
    }

    /* ─── REVEAL HOOK ─── */
    function useReveal() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
        }, { threshold: 0.08 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    /* ─── REVEAL WRAPPER ─── */
    function Reveal({ children, delay = 0, className = '' }) {
      const ref = useReveal();
      return (
        <div ref={ref} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>
          {children}
        </div>
      );
    }

                </li>
              ))}
              <li>
                <a href="#contacto" className="text-xs font-bold tracking-widest uppercase bg-purple-dark text-white px-5 py-2.5 hover:bg-pink-deep transition-colors duration-200">{t.navContact}</a>
              </li>
            </ul>

            {/* Lang switch + hamburger */}
            <div className="flex items-center gap-3">
              <div className="flex gap-1.5">
                {['es','en'].map(l => (
                  <button key={l} onClick={() => setLang(l)}
                    className={`text-xs font-bold tracking-widest px-3 py-2 border-2 transition-all duration-200 ${lang === l ? 'bg-purple-dark text-white border-purple-dark' : 'bg-transparent text-purple-dark border-purple-light hover:border-pink-bright hover:text-pink-deep'}`}>
                    {l.toUpperCase()}
                  </button>
                ))}
              </div>
              <button onClick={toggle} className={`lg:hidden flex flex-col gap-[5px] p-1 ${menuOpen ? 'ham-open' : ''}`} aria-label="Menú">
                <span className="ham-line" /><span className="ham-line" /><span className="ham-line" />
              </button>
            </div>
          </nav>

          {/* Mobile overlay */}
          <div className={`mobile-overlay fixed inset-0 z-40 bg-dark flex flex-col items-center justify-center ${menuOpen ? 'open' : 'closed'}`}>
            <ul className="list-none text-center w-full">
              {[...links, { href:'#contacto', label:t.navContact }, { href:'#privacidad', label:t.navPrivacy }].map(l => (
                <li key={l.href} className="border-b border-white/10 first:border-t first:border-white/10">
                  <a href={l.href} target={l.target} onClick={close}
                    className="block font-playfair text-2xl font-bold text-white hover:text-pink-pastel hover:bg-white/5 transition-all duration-200 py-5 px-8">
                    {l.label}
                  </a>
                </li>
              ))}
            </ul>
          </div>
        </>
      );
    }

    /* ─── HERO ─── */
    function Hero({ t }) {
      return (
        <section id="hero" className="min-h-screen pt-20 grid grid-cols-1 lg:grid-cols-2">
          {/* Left — purple */}
          <div className="bg-purple-dark flex flex-col justify-center px-8 md:px-16 py-16 relative overflow-hidden">
            <div className="hero-circle-1" />
            <div className="hero-circle-2" />
            <div className="relative z-10">
              <p className="hero-item flex items-center gap-3 text-xs font-bold tracking-[0.2em] uppercase text-pink-pastel mb-6">
                <span className="w-8 h-0.5 bg-pink-pastel inline-block shrink-0" />
                {t.heroTag}
              </p>
              <h1 className="hero-item font-playfair font-black text-white leading-[1.05] mb-6" style={{fontSize:'clamp(2.8rem,5vw,5.5rem)'}}>
                <HTML html={t.heroTitle} />
              </h1>
              <p className="hero-item text-white/70 leading-relaxed max-w-md mb-10" style={{fontSize:'1.05rem'}}>
                {t.heroSubtitle}
              </p>
              <div className="hero-item flex flex-wrap gap-4">
                <a href="#manifiesto" className="bg-pink-bright text-white px-8 py-3.5 text-sm font-bold tracking-widest uppercase hover:bg-pink-deep transition-all duration-200 hover:-translate-y-0.5 inline-block">
                  {t.manifestoBtn}
                </a>
                <a href="#firmas" className="border-2 border-white/40 text-white px-8 py-3.5 text-sm font-bold tracking-widest uppercase hover:border-pink-pastel hover:bg-pink-pastel/10 transition-all duration-200 inline-block">
                  {t.signBtn}
                </a>
              </div>
            </div>
          </div>

          {/* Right — pink */}
          <div className="hidden lg:flex bg-pink-pastel flex-col justify-end items-center pt-20 pb-0 relative overflow-hidden">
            {/* Decorative watermark text */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none select-none overflow-hidden">
              <span className="font-playfair font-black text-purple-dark/[0.06] text-center leading-none" style={{fontSize:'9rem'}}>
                COLOMBIA<br/>PROGRESA
              </span>
            </div>
            {/* Slogan block */}
            <div className="w-full bg-dark px-8 py-7 relative z-10">
              <p className="font-serif italic text-pink-pastel leading-relaxed" style={{fontSize:'1.5rem'}}>
                {t.slogan}
              </p>
            </div>
          </div>
        </section>
      );
    }

    /* ─── TICKER ─── */
    function Ticker({ t }) {
      const words = [...t.ticker, ...t.ticker];
      return (
        <div className="bg-pink-bright text-white py-3 overflow-hidden" aria-hidden="true">
          <div className="ticker-inner text-xs font-bold tracking-[0.12em] uppercase">
            {words.map((w, i) => <span key={i} className="mx-10 before:content-['✦_']">{w}</span>)}
          </div>
        </div>
      );
    }

    /* ─── MANIFESTO ─── */
    function Manifesto({ t }) {
      const ref = useReveal();
      return (
        <section id="manifiesto" className="grid grid-cols-1 md:grid-cols-[1fr_2fr]">
          {/* Vertical label */}
          <div className="bg-dark flex items-center justify-center py-12 md:py-0 px-8">
            <h2 className="font-playfair font-black text-pink-pastel md:writing-vertical"
                style={{fontSize:'clamp(2.5rem,4vw,4rem)', writingMode:'vertical-rl', transform:'rotate(180deg)'}}>
              {t.manifestoTitle}
            </h2>
          </div>

          {/* Content */}
          <div ref={ref} className="reveal px-8 md:px-16 py-16 md:py-20 border-t-4 border-purple-light flex flex-col justify-center gap-6">
            {[t.manifesto1, t.manifesto2, t.manifesto3, t.manifesto4].map((p, i) => (
              <HTML key={i} tag="p" html={p}
                className="manifesto-text leading-relaxed text-dark [&_strong]:text-purple-dark"
                style={{fontSize:'clamp(1.1rem,1.8vw,1.55rem)'}} />
            ))}
          </div>
        </section>
      );
    }

    /* ─── POLICIES ─── */
    function PolicyCard({ icon, title, text, delay }) {
      const ref = useReveal();
      return (
        <div ref={ref} className="reveal policy-card bg-purple-dark cursor-default p-8 md:p-10" style={{ transitionDelay:`${delay}ms` }}>
          <span className="text-4xl mb-5 block">{icon}</span>
          <h3 className="text-xs font-bold tracking-[0.06em] uppercase text-pink-pastel mb-3">{title}</h3>
          <p className="text-sm leading-relaxed text-white/70">{text}</p>
        </div>
      );
    }

    function Policies({ t }) {
      return (
        <section id="politicas" className="bg-purple-dark px-6 md:px-16 py-20">
          <div className="flex items-baseline gap-6 mb-12">
            <h2 className="font-playfair font-black text-white whitespace-nowrap" style={{fontSize:'clamp(2rem,3.5vw,3.5rem)'}}>
              {t.policiesTitle}
            </h2>
            <div className="section-line" />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-px bg-white/15">
            {t.policies.map((p, i) => (
              <PolicyCard key={i} {...p} delay={i * 60} />
            ))}
          </div>
        </section>
      );
    }

    /* ─── FOUNDER ─── */
    function Founder({ t }) {
      const textRef = useReveal();
      return (
        <section id="fundadora" className="grid grid-cols-1 md:grid-cols-2">
          {/* Photo placeholder */}
          <div className="bg-purple-light min-h-80 flex items-center justify-center relative overflow-hidden">
            <div className="w-44 h-44 rounded-full bg-purple-mid flex items-center justify-center text-7xl border-8 border-white shadow-2xl ring-4 ring-pink-bright">
              👩‍💻
            </div>
            {/* Decorative circles */}
            <div className="absolute -top-16 -right-16 w-64 h-64 rounded-full border-4 border-purple-dark/20" />
            <div className="absolute -bottom-8 -left-8 w-40 h-40 rounded-full border-4 border-white/30" />
          </div>

          {/* Text */}
          <div ref={textRef} className="reveal px-8 md:px-16 py-16 border-t-4 border-pink-pastel flex flex-col justify-center gap-4">
            <p className="flex items-center gap-2 text-xs font-bold tracking-[0.2em] uppercase text-purple-dark">
              <span className="w-6 h-0.5 bg-purple-dark inline-block" />{t.founderTag}
            </p>
            <h2 className="font-playfair font-black text-dark leading-tight" style={{fontSize:'clamp(2rem,3vw,3rem)'}}>
              <HTML html={t.founderTitle} className="[&_em]:italic [&_em]:text-purple-dark" />
            </h2>
            {[t.founder1, t.founder2].map((p, i) => (
              <p key={i} className="text-muted leading-relaxed">{p}</p>
            ))}
            <HTML tag="p" html={t.founder3} className="text-muted leading-relaxed [&_strong]:text-dark [&_strong]:font-bold" />
          </div>
        </section>
      );
    }

    /* ─── STATS ─── */
    function Stats({ t, firmasCount }) {
      const stats = [
        { num: '8',                    label: t.stat1 },
        { num: firmasCount.toLocaleString('es-CO'), label: t.stat2 },
        { num: '53.9m',                label: t.stat3 },
      ];
      return (
        <section className="grid grid-cols-1 sm:grid-cols-3 gap-px bg-pink-bright">
          {stats.map((s, i) => (
            <Reveal key={i} delay={i * 100}>
              <div className="bg-pink-pastel px-8 py-14 text-center">
                <div className="stat-num font-black text-purple-dark leading-none mb-2" style={{fontSize:'clamp(3rem,5vw,5.5rem)'}}>
                  {s.num}
                </div>
                <div className="text-xs font-bold tracking-[0.15em] uppercase text-pink-deep">{s.label}</div>
              </div>
            </Reveal>
          ))}
        </section>
      );
    }

    /* ─── SIGNATURES ─── */
    function Signatures({ t, firmasData, setFirmasData, lang }) {
      const [form, setForm] = useState({ name:'', doc:'', city:'', email:'', consent:false });
      const [feedback, setFeedback] = useState({ msg:'', type:'' });
      const [loading, setLoading] = useState(false);

      const count = firmasData.count;
      const pct = Math.min(100, Math.round((count / META_FIRMAS) * 100));

      const saveFirmas = async (data) => {
        try { await window.storage?.set(STORAGE_KEY, JSON.stringify(data), true); } catch {}
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const { name, doc, email, consent } = form;
        if (!name || !doc || !email || !consent || !email.includes('@')) {
          setFeedback({ msg: t.sigError, type: 'error' }); return;
        }
        const docHash = simpleHash(doc);
        if (firmasData.docs?.includes(docHash)) {
          setFeedback({ msg: t.sigDuplicate, type: 'success' }); return;
        }
        setLoading(true);
        const updated = { count: firmasData.count + 1, docs: [...(firmasData.docs || []), docHash] };
        setFirmasData(updated);
        await saveFirmas(updated);
        setForm({ name:'', doc:'', city:'', email:'', consent:false });
        setFeedback({ msg: t.sigSuccess, type: 'success' });
        setLoading(false);
      };

      return (
        <section id="firmas" className="bg-dark px-6 md:px-16 py-20">
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 xl:gap-20 items-start">

            {/* Left — info + progress */}
            <Reveal>
              <p className="flex items-center gap-3 text-xs font-bold tracking-[0.2em] uppercase text-purple-light mb-4">
                <span className="w-6 h-0.5 bg-purple-light inline-block" />{t.sigTag}
              </p>
              <h2 className="font-playfair font-black text-white leading-tight mb-5" style={{fontSize:'clamp(2rem,3vw,3.2rem)'}}>
                <HTML html={t.sigTitle} className="[&_em]:italic [&_em]:text-pink-pastel" />
              </h2>
              <p className="text-white/60 leading-relaxed mb-10">{t.sigText}</p>

              {/* Progress */}
              <div>
                <div className="h-2.5 bg-white/10 rounded-full overflow-hidden mb-2">
                  <div className="bar-fill h-full rounded-full bg-gradient-to-r from-purple-light to-pink-bright" style={{width:`${pct}%`}} />
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-white/50">
                    <span className="text-pink-pastel font-bold">{count.toLocaleString('es-CO')}</span>
                    {' '}{t.sigOf}{' '}{META_FIRMAS.toLocaleString('es-CO')}{' '}{t.sigSigs}
                  </span>
                  <span className="font-playfair font-black text-pink-pastel" style={{fontSize:'2.5rem'}}>{pct}%</span>
                </div>
              </div>
            </Reveal>

            {/* Right — form */}
            <Reveal delay={120}>
              <div className="bg-white/5 border border-white/12 p-8">
                <h3 className="font-playfair text-xl font-bold text-white mb-6">{t.sigFormTitle}</h3>
                <form onSubmit={handleSubmit} noValidate>
                  <FormField label={t.sigName}>
                    <input className="pi-input" type="text" value={form.name} onChange={e => setForm(f=>({...f,name:e.target.value}))} autoComplete="name" />
                  </FormField>
                  <div className="grid grid-cols-2 gap-4 mb-4">
                    <FormField label={t.sigDoc}>
                      <input className="pi-input" type="text" inputMode="numeric" maxLength={10} value={form.doc} onChange={e => setForm(f=>({...f,doc:e.target.value}))} />
                    </FormField>
                    <FormField label={t.sigCity}>
                      <input className="pi-input" type="text" value={form.city} onChange={e => setForm(f=>({...f,city:e.target.value}))} autoComplete="address-level2" />
                    </FormField>
                  </div>
                  <FormField label={t.sigEmail}>
                    <input className="pi-input" type="email" value={form.email} onChange={e => setForm(f=>({...f,email:e.target.value}))} autoComplete="email" />
                  </FormField>

                  <div className="flex items-start gap-3 mb-5 mt-2">
                    <input type="checkbox" id="sig-consent" checked={form.consent} onChange={e => setForm(f=>({...f,consent:e.target.checked}))} className="mt-0.5 w-4 h-4 shrink-0" />
                    <label htmlFor="sig-consent" className="text-xs text-white/50 leading-relaxed cursor-pointer">{t.sigConsent}</label>
                  </div>

                  <button type="submit" disabled={loading}
                    className="w-full bg-pink-bright text-white text-sm font-bold tracking-widest uppercase py-4 hover:bg-pink-deep transition-colors duration-200 disabled:opacity-60">
                    {loading ? '...' : t.sigSubmit}
                  </button>

                  {feedback.msg && (
                    <p className={`mt-4 text-sm font-medium ${feedback.type === 'success' ? 'text-pink-pastel' : 'text-red-400'}`}>
                      {feedback.msg}
                    </p>
                  )}
                </form>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    /* ─── FORM FIELD ─── */
    function FormField({ label, children }) {
      return (
        <div className="mb-4">
          <label className="block text-xs font-bold tracking-widest uppercase text-purple-light mb-1.5">{label}</label>
          {React.cloneElement(children, {
            className: `pi-input w-full bg-white/7 border border-white/20 text-white text-sm px-4 py-3 placeholder-white/30 transition-all duration-200 ${children.props.className || ''}`
          })}
        </div>
      );
    }

    /* ─── CONTACT ─── */
    function Contact({ t, lang }) {
      const [form, setForm] = useState({ name:'', email:'', subject:'', msg:'' });
      const [feedback, setFeedback] = useState({ msg:'', type:'' });
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const { name, email, msg } = form;
        if (!name || !email || !msg || !email.includes('@')) {
          setFeedback({ msg: t.ctaError, type: 'error' }); return;
        }
        setLoading(true);
        try {
          const userContent = lang === 'es'
            ? `Nombre: ${name}\nCorreo: ${email}\nAsunto: ${form.subject || '(sin asunto)'}\nMensaje: ${msg}`
            : `Name: ${name}\nEmail: ${email}\nSubject: ${form.subject || '(no subject)'}\nMessage: ${msg}`;

          const resp = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514', max_tokens: 300,
              system: t.sysPrompt,
              messages: [{ role: 'user', content: userContent }]
            })
          });
          const data = await resp.json();
          const reply = data.content?.find(b => b.type === 'text')?.text || t.ctaSuccess;
          setForm({ name:'', email:'', subject:'', msg:'' });
          setFeedback({ msg: reply, type: 'success' });
        } catch {
          setFeedback({ msg: t.ctaSuccess, type: 'success' });
        }
        setLoading(false);
      };

      return (
        <section id="contacto" className="bg-purple-dark px-6 md:px-16 py-20">
          <div className="grid grid-cols-1 lg:grid-cols-[1fr_1.4fr] gap-12 xl:gap-20 items-start">

            <Reveal>
              <p className="flex items-center gap-3 text-xs font-bold tracking-[0.2em] uppercase text-pink-pastel mb-4">
                <span className="w-6 h-0.5 bg-pink-pastel inline-block" />{t.ctaTag}
              </p>
              <h2 className="font-playfair font-black text-white leading-tight mb-5" style={{fontSize:'clamp(2rem,3vw,3rem)'}}>
                <HTML html={t.ctaTitle} className="[&_em]:italic [&_em]:text-pink-pastel" />
              </h2>
              <p className="text-white/60 leading-relaxed mb-6">{t.ctaText}</p>
              <a href="mailto:contacto@patrimonioideal.co" className="text-sm font-medium text-pink-pastel hover:text-white transition-colors duration-200">
                ✉ contacto@patrimonioideal.co
              </a>
            </Reveal>

            <Reveal delay={120}>
              <div className="bg-white/5 border border-white/12 p-8">
                <form onSubmit={handleSubmit} noValidate>
                  <div className="grid grid-cols-2 gap-4 mb-4">
                    <FormField label={t.ctaName}>
                      <input type="text" value={form.name} onChange={e => setForm(f=>({...f,name:e.target.value}))} />
                    </FormField>
                    <FormField label={t.ctaEmail2}>
                      <input type="email" value={form.email} onChange={e => setForm(f=>({...f,email:e.target.value}))} />
                    </FormField>
                  </div>
                  <FormField label={t.ctaSubject}>
                    <input type="text" value={form.subject} onChange={e => setForm(f=>({...f,subject:e.target.value}))} />
                  </FormField>
                  <FormField label={t.ctaMsg}>
                    <textarea rows={5} value={form.msg} onChange={e => setForm(f=>({...f,msg:e.target.value}))}
                      className="pi-input w-full bg-white/7 border border-white/20 text-white text-sm px-4 py-3 placeholder-white/30 transition-all duration-200 resize-y" />
                  </FormField>
                  <button type="submit" disabled={loading}
                    className="w-full bg-pink-bright text-white text-sm font-bold tracking-widest uppercase py-4 hover:bg-pink-deep transition-colors duration-200 disabled:opacity-60 mt-2">
                    {loading ? t.ctaSending : t.ctaSubmit}
                  </button>
                  {feedback.msg && (
                    <p className={`mt-4 text-sm font-medium leading-relaxed ${feedback.type === 'success' ? 'text-pink-pastel' : 'text-red-400'}`}>
                      {feedback.msg}
                    </p>
                  )}
                </form>
              </div>
            </Reveal>

          </div>
        </section>
      );
    }

    /* ─── PRIVACY ─── */
    function Privacy({ t }) {
      return (
        <section id="privacidad" className="bg-cream px-6 md:px-16 py-20 border-t-4 border-purple-light">
          <div className="max-w-6xl mx-auto">
            <div className="mb-10 pb-6 border-b border-purple-light">
              <h2 className="font-playfair font-black text-purple-dark mb-2" style={{fontSize:'clamp(1.5rem,2.5vw,2.2rem)'}}>
                {t.privTitle}
              </h2>
              <p className="text-xs font-medium tracking-widest uppercase text-muted">{t.privDate}</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
              {t.privacy.map((block, i) => (
                <Reveal key={i} delay={i * 80}>
                  <h3 className="text-xs font-bold tracking-widest uppercase text-purple-dark mb-2">{block.h}</h3>
                  <HTML tag="p" html={block.p} className="text-sm leading-relaxed text-muted" />
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ─── FOOTER ─── */
    function Footer({ t }) {
      const links = ['navManifesto','navPolicies','navFounder','navSign','navContact','navPrivacy'];
      const hrefs = ['#manifiesto','#politicas','#fundadora','#firmas','#contacto','#privacidad'];
      return (
        <footer className="border-t-4 border-purple-light px-6 md:px-16 py-10 flex flex-col md:flex-row items-center md:items-start justify-between gap-8 flex-wrap">
          <div className="flex flex-col gap-2 items-center md:items-start">
            <img src="assets/patri-ideal.png" alt="Patrimonio Ideal" className="h-11 w-auto" onError={e => e.target.style.display='none'} />
            <p className="text-xs text-muted">{t.footerFounded}</p>
            <a href="files/programa-de-gobierno-2026.pdf" target="_blank"
              className="text-xs font-bold tracking-widest uppercase text-purple-dark border-b-2 border-pink-pastel pb-px hover:text-pink-deep hover:border-pink-deep transition-colors duration-200">
              {t.footerProgram}
            </a>
          </div>
          <ul className="flex flex-wrap gap-6 list-none justify-center">
            {links.map((key, i) => (
              <li key={key}>
                <a href={hrefs[i]} className="footer-link-item text-xs font-medium tracking-widest uppercase text-muted transition-colors duration-200">
                  {t[key]}
                </a>
              </li>
            ))}
          </ul>
          <p className="text-xs text-muted">© 2026 Patrimonio Ideal · Colombia</p>
        </footer>
      );
    }

    /* ─── APP ─── */
    function App() {
      const [lang, setLang] = useState('es');
      const [firmasData, setFirmasData] = useState({ count: 0, docs: [] });
      const t = T[lang];

      useEffect(() => {
        document.documentElement.lang = lang;
      }, [lang]);

      // Load firmas from storage
      useEffect(() => {
        (async () => {
          try {
            const result = await window.storage?.get(STORAGE_KEY, true);
            if (result?.value) setFirmasData(JSON.parse(result.value));
          } catch {}
        })();
      }, []);

      return (
        <>
          <Nav lang={lang} setLang={setLang} t={t} />
          <Hero t={t} />
          <Ticker t={t} />
          <Manifesto t={t} />
          <Policies t={t} />
          <Founder t={t} />
          <Stats t={t} firmasCount={firmasData.count} />
          <Signatures t={t} firmasData={firmasData} setFirmasData={setFirmasData} lang={lang} />
          <Contact t={t} lang={lang} />
          <Privacy t={t} />
          <Footer t={t} />
        </>
      );
    }

    /* ─── MOUNT ─── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
